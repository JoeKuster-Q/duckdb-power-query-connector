name: Build DuckDB Power Query Connector

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Power Query Connector (.mez)
        shell: pwsh
        run: |
          Write-Host "Building DuckDB Power Query Connector..."
          msbuild DuckDB.proj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU

      - name: List build output
        shell: pwsh
        run: |
          Write-Host "Build output:"
          Get-ChildItem -Recurse bin
``
